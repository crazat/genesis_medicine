# 6단계 스크리닝 캐스케이드 (v2 고도화)
# DrugCLIP → Uni-Mol2 → FlowDock → Boltz-2 → GNINA 1.3 → PoseBusters
#
# 합의 스코어링: ECR (Exponential Consensus Ranking)

stages:
  - name: drugclip_prefilter
    engine: drugclip
    top_fraction: 0.01       # 대규모 라이브러리에서 top 1%
    batch_size: 512
    enabled: true            # 라이브러리 < 10K면 비활성

  - name: embedding_similarity
    engine: unimol2
    top_fraction: 0.02       # top 2%
    batch_size: 256

  - name: flowdock
    engine: flowdock
    top_n: 1000
    samples_per_ligand: 10

  - name: boltz2_cofolding
    engine: boltz2
    top_n: 100
    predict_affinity: true
    sampling_steps_affinity: 200
    diffusion_samples_affinity: 5
    affinity_mw_correction: true
    no_kernels: false        # cuequivariance v0.7+ 설치 환경 기본

  - name: gnina_rescore
    engine: gnina_1_3
    cnn_scoring: rescore
    top_n: 50

  - name: posebusters_validation
    engine: posebusters
    full_check: true

consensus:
  method: ecr               # Exponential Consensus Ranking
  sigma: 0.05               # 상위 순위 가중
  stages_for_ranking:        # ECR에 참여하는 단계
    - embedding_similarity
    - flowdock
    - boltz2_cofolding
    - gnina_rescore

parallelism:
  max_gpu_jobs: 1
  use_ray: false

# Active Learning — Deep Docking 점진 (B4)
# 1.4B+ 라이브러리에서 0.1~0.5%만 도킹하고 99% 회수
active_learning:
  enabled: false                  # 라이브러리 ≥ 1M일 때만 켬
  initial_fraction: 0.01
  rounds: 4
  batch_fraction: 0.01
  exploration_weight: 0.3
  surrogate: chemprop2            # chemprop2 | random_forest
  target_score_threshold: null    # 절대 임계 (조기 종료용)
