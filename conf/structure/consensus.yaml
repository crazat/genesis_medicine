# 구조 예측 합의 — Protenix-v2 + OpenFold3 + Boltz-2 (B5)

engine: consensus
engines:
  - boltz2
  - protenix
  - openfold3

samples_per_engine: 3
rmsd_threshold: 2.0                # 클러스터링 (Å)
device: cuda:0
cache_dir: ${oc.env:GENESIS_CACHE,./.cache}/consensus

# 합의 점수: 큰 클러스터에 모이는 비율 × 평균 pLDDT
# 신뢰도 임계값
min_consensus_ratio: 0.6           # 어댑터 ≥ 60%가 같은 클러스터에 있어야 신뢰
min_consensus_plddt: 70.0
