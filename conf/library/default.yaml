# 통합 ligand library — build_profile에 따라 자동 분기
# commercial: chembl/coconut/lotus/npass/npatlas/drduke/pubchem/zinc22
# research:  + herb/tcmsp/ktkp

sources:
  chembl:
    enabled: true
    min_activity_pchembl: 5.0
  coconut:
    enabled: true
    version: "2.0"
    license: CC0
  lotus:
    enabled: true
  npass:
    enabled: true
    version: "3"
    note: "NAR 2026 update — quantitative ADME-Tox 포함"
  npatlas:
    enabled: true
    version: "3"
  drduke:
    enabled: true
    note: "USDA public domain"
  # 상업 빌드에서는 자동으로 비활성화됨 (LicenseGate)
  herb:
    enabled: true
    note: "CC-BY-NC — 내부 연구용만. 상용화 시 제외"
  tcmsp:
    enabled: true
    ob_min: 30
    dl_min: 0.18
  ktkp:
    enabled: true
    source: "koreantk.com"
    note: "API 부재, 분기별 수동 스냅샷"

filters:
  lipinski: soft
  pains: strict
  np_likeness_min: -2.0
  mw_range: [150, 700]
  logp_range: [-2.0, 6.0]

dedup:
  key: inchikey
  standardize: true

output:
  format: parquet
  partition_by: source
