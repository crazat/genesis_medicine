# 탈모 (AGA) 타겟 프로파일

category: androgenetic_alopecia
priority_tier: 3

targets:
  - key: SRD5A2
    uniprot: P31213
    display: "5α-reductase type 2"
    mode: inhibitor
    rationale: "finasteride 타겟. 두피 모낭 고발현. Testosterone → DHT 전환 억제."
    pocket_hint: "NADPH-binding + steroid pocket (membrane-bound)"
    af_db: "https://alphafold.ebi.ac.uk/files/AF-P31213-F1-model_v6.cif"
    known_inhibitors: ["finasteride", "dutasteride", "gallic acid (mild)"]

  - key: SRD5A1
    uniprot: P18405
    display: "5α-reductase type 1"
    mode: inhibitor
    rationale: "dutasteride는 dual. type 1 억제로 피지 감소 부가 효과."
    af_db: "https://alphafold.ebi.ac.uk/files/AF-P18405-F1-model_v6.cif"

  - key: AR
    uniprot: P10275
    display: "Androgen receptor"
    mode: antagonist           # 두피에서만 선택적 길항 원함 (SARM 방향)
    rationale: "DHT의 AR 결합 차단으로 모낭 축소 방지. 전신 영향 최소화 필요."
    pocket_hint: "LBD (ligand binding domain), helix 12 conformation"
    af_db: "https://alphafold.ebi.ac.uk/files/AF-P10275-F1-model_v6.cif"

  - key: WNT10B
    uniprot: O00744
    display: "Wnt-10b"
    mode: agonist_pathway      # Wnt 경로 활성화 (모낭 재생)
    rationale: "모낭 stem cell 활성. 직접 agonist 어려움, GSK3β 억제로 우회."
    af_db: "https://alphafold.ebi.ac.uk/files/AF-O00744-F1-model_v6.cif"

  - key: CTNNB1
    uniprot: P35222
    display: "β-catenin"
    mode: stabilizer_preserve
    rationale: "Wnt 하류. stabilize하는 분자가 모낭 재생에 유리."
    af_db: "https://alphafold.ebi.ac.uk/files/AF-P35222-F1-model_v6.cif"

  - key: PTGDR2
    uniprot: Q9Y5Y4
    display: "PTGDR2 (CRTH2) — PGD2 수용체"
    mode: antagonist
    rationale: "탈모에서 PGD2 상승 → DP2 길항 시 모발 성장 (setipiprant 임상 실패 but scalp topical 재검토)."
    af_db: "https://alphafold.ebi.ac.uk/files/AF-Q9Y5Y4-F1-model_v6.cif"

  # --- 2026-04-27 추가: Pilosebaceous atlas (bioRxiv 2025-09) + Nat Commun 2026 evidence
  - key: PIEZO1
    uniprot: Q92508
    display: "PIEZO1 mechanosensitive channel"
    mode: inhibitor
    rationale: |
      AGA에서 connective tissue sheath (CTS) hypercontractility → mechanosensation.
      PIEZO1 inhibitor + ML-7 (MLCK)이 ex vivo + humanized 모델에서 발모 회복
      (Nat Commun 2026). dermal papilla + CTS fibroblast에서 고발현
      (pilosebaceous atlas 2025-09).
    pocket_hint: "Cap dome + central pore (Y2022/F2023 helix)"
    af_db: "https://alphafold.ebi.ac.uk/files/AF-Q92508-F1-model_v6.cif"
    cell_types: ["hair_follicle.dermal_papilla", "connective_tissue_sheath.fibroblast"]
    novel_target: true

  - key: MYLK
    uniprot: Q15746
    display: "Myosin light chain kinase (MLCK)"
    mode: inhibitor
    rationale: |
      ML-7 (MLCK inhibitor)가 인간화 AGA 모델에서 발모 회복
      (Nat Commun 2026). CTS hypercontractility 직접 차단.
      PIEZO1 axis와 합성치사(synthetic lethal-like).
    pocket_hint: "Catalytic kinase domain, CaM-binding"
    af_db: "https://alphafold.ebi.ac.uk/files/AF-Q15746-F1-model_v6.cif"
    cell_types: ["connective_tissue_sheath.fibroblast"]
    known_inhibitors: ["ML-7", "ML-9"]
    novel_target: true

evaluation:
  selectivity_required:
    - "SRD5A2 vs SRD5A1 (finasteride selectivity)"
    - "topical scalp vs systemic AR"
    - "PIEZO1 (skin) vs PIEZO2 (proprioception, pain) — selectivity 필수"
    - "MYLK (CTS) vs cardiac MLCK"
  bonus_for_topical_only: 0.3
  bonus_for_mechanotransduction: 0.2     # PIEZO1+MYLK dual axis
  cell_type_priority:
    - "hair_follicle.dermal_papilla"
    - "connective_tissue_sheath.fibroblast"
    - "hair_follicle.matrix_progenitor"
